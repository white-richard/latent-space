name: cifar-10-lightning
on: workflow_dispatch

jobs:
  run:
    runs-on: [self-hosted, cml, gpu]
    steps:
      - name: Cleanup
        run: rm -rf $GITHUB_WORKSPACE && mkdir -p $GITHUB_WORKSPACE

      - name: Checkout
        run: |
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/white-richard/latent-space.git .

      - name: Train model
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uv venv .venv
          source .venv/bin/activate
          uv pip install -r requirements.txt
          fish src/cifar_lightning/run.fish --debug-mode