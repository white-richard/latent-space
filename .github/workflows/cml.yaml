name: cifar-10-lightning
on: workflow_dispatch

jobs:
  run:
    runs-on: [self-hosted, cml, gpu]
    permissions:
      contents: write
      pull-requests: write
      issues: write
    defaults:
      run:
        shell: bash -exo pipefail {0}
    steps:
      - name: Cleanup
        run: rm -rf $GITHUB_WORKSPACE && mkdir -p $GITHUB_WORKSPACE

      - name: Checkout
        run: |
          git clone --recurse-submodules https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/white-richard/latent-space.git $HOME/latent-space
      - name: Setup
        run: |
          cd $HOME/latent-space
          uv venv --python 3.10
          fish -c "source .venv/bin/activate.fish; fish setup.fish --dino"
          dvc remote default --local wpeb-print
          dvc remote modify --local wpeb-print keyfile /root/.ssh/id_ed25519
          dvc pull /root/.code/latent-space/datasets/cifar.dvc

      - name: Train model
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          nvidia-smi
          cd $HOME/latent-space
          fish -c "source .venv/bin/activate.fish; fish src/cifar_lightning/run.fish --debug-mode"
      - name: Create PR
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd $HOME/latent-space
          cat out/metrics.txt >> report.md
          echo "![](./out/pacmap_emb.png)" >> report.md
          echo "![](./out/umap_nn15_emb.png)" >> report.md
          dvc add out
          dvc push
          cml pr create --md out/ --title "${{ github.workflow }}: $(date +'%Y-%m-%d %H:%M')" --message report.md