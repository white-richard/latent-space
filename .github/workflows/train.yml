name: Train

on:
  push:
    branches: [main, 'expr/**']
  pull_request:

jobs:
  train:
    runs-on: [self-hosted, slurm]
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Submit job to Slurm
        id: submit
        run: |
          JOB_ID=$(GIT_BRANCH="${{ github.ref_name }}" \
            RUN_SCRIPT="src/cifar_lightning/run_higher_lr.fish" \
            sbatch --parsable jobs/train.sh)
          echo "job_id=$JOB_ID" >> $GITHUB_OUTPUT

          JOB_ID=$(GIT_BRANCH="$BRANCH" \
            RUN_SCRIPT="$RUN_SCRIPT" \
            sbatch --parsable jobs/train.sh)
          echo "Submitted Slurm job $JOB_ID on $(hostname)"
          echo "Monitor: squeue or cat /tmp/slurm-${JOB_ID}.err"
